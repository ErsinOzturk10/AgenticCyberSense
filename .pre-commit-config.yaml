repos:
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.0.271
    hooks:
      - id: ruff
        args: [--fix]---
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.9
    hooks:
      - id: ruff-check
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format